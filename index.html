<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Region | House of Sapphires</title>
    <link rel="canonical" href="https://houseofsapphires.com/">
    <meta name="description" content="Choose your House of Sapphires region for Bangladesh or the United States.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <script defer src="/assets/js/script.js"></script>
</head>
<body class="region-selector-page" data-region-root>
    <main class="region-selector">
        <div class="region-selector-inner fade-in">
            <img src="/assets/images/logo_final.png" alt="House of Sapphires logo" class="region-selector-logo">
            <h1>Choose Your Region</h1>
            <p>Select the House of Sapphires experience for your location.</p>
            <div class="region-actions">
                <a href="/bd/" class="btn" data-region-choice="bd">Bangladesh</a>
                <a href="/us/" class="btn-secondary" data-region-choice="us">United States</a>
                <button type="button" class="btn region-location-btn" data-use-location>Use My Current Location</button>
            </div>
            <p class="region-message" data-region-message role="status" aria-live="polite"></p>
        </div>
    </main>
</body>
</html>
